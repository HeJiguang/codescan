<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">CodeScan sample findings preview</title>
  <desc id="desc">A dark structured review dashboard showing issue counts, finding rows, and metadata for a sample CodeScan result.</desc>
  <defs>
    <linearGradient id="bg" x1="40" y1="28" x2="1160" y2="732" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111E" />
      <stop offset="1" stop-color="#0C1728" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0F1D31" />
      <stop offset="1" stop-color="#0B1727" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="#020817" flood-opacity="0.32" />
    </filter>
  </defs>

  <rect width="1200" height="760" rx="40" fill="url(#bg)" />
  <rect x="20.5" y="20.5" width="1159" height="719" rx="39.5" stroke="#1D324A" />

  <g opacity="0.14">
    <path d="M60 120H1140" stroke="#35506D" />
    <path d="M60 180H1140" stroke="#35506D" />
    <path d="M60 240H1140" stroke="#35506D" />
    <path d="M60 300H1140" stroke="#35506D" />
    <path d="M60 360H1140" stroke="#35506D" />
    <path d="M60 420H1140" stroke="#35506D" />
    <path d="M60 480H1140" stroke="#35506D" />
    <path d="M60 540H1140" stroke="#35506D" />
    <path d="M60 600H1140" stroke="#35506D" />
    <path d="M60 660H1140" stroke="#35506D" />
    <path d="M180 60V700" stroke="#35506D" />
    <path d="M360 60V700" stroke="#35506D" />
    <path d="M540 60V700" stroke="#35506D" />
    <path d="M720 60V700" stroke="#35506D" />
    <path d="M900 60V700" stroke="#35506D" />
    <path d="M1080 60V700" stroke="#35506D" />
  </g>

  <text x="70" y="88" font-family="'Segoe UI', Arial, sans-serif" font-size="42" font-weight="700" fill="#F8FBFF">
    Example structured findings from CodeScan
  </text>
  <text x="70" y="126" font-family="'Segoe UI', Arial, sans-serif" font-size="22" fill="#9EB9D6">
    A dark review console for the demo vulnerable app, shaped like the kind of MCP result a coding agent can reason over.
  </text>

  <g filter="url(#shadow)">
    <rect x="70" y="170" width="1060" height="520" rx="30" fill="url(#panel)" stroke="#21354C" />
  </g>

  <g font-family="'Segoe UI', Arial, sans-serif">
    <rect x="102" y="206" width="202" height="102" rx="20" fill="#0A1322" stroke="#20344D" />
    <rect x="324" y="206" width="202" height="102" rx="20" fill="#0A1322" stroke="#20344D" />
    <rect x="546" y="206" width="202" height="102" rx="20" fill="#0A1322" stroke="#20344D" />
    <rect x="768" y="206" width="202" height="102" rx="20" fill="#0A1322" stroke="#20344D" />

    <text x="128" y="244" font-size="16" fill="#89ACCC">Total issues</text>
    <text x="128" y="290" font-size="38" font-weight="700" fill="#F8FBFF">4</text>

    <text x="350" y="244" font-size="16" fill="#89ACCC">High severity</text>
    <text x="350" y="290" font-size="38" font-weight="700" fill="#F8FBFF">2</text>

    <text x="572" y="244" font-size="16" fill="#89ACCC">Medium severity</text>
    <text x="572" y="290" font-size="38" font-weight="700" fill="#F8FBFF">2</text>

    <text x="794" y="244" font-size="16" fill="#89ACCC">Files</text>
    <text x="794" y="290" font-size="38" font-weight="700" fill="#F8FBFF">2</text>
  </g>

  <g font-family="'Segoe UI', Arial, sans-serif">
    <rect x="102" y="342" width="748" height="72" rx="18" fill="#311A1A" stroke="#6E2A2A" />
    <rect x="102" y="432" width="748" height="72" rx="18" fill="#311A1A" stroke="#6E2A2A" />
    <rect x="102" y="522" width="748" height="72" rx="18" fill="#382814" stroke="#715326" />
    <rect x="102" y="612" width="748" height="72" rx="18" fill="#382814" stroke="#715326" />

    <text x="126" y="372" font-size="13" fill="#FCA5A5">HIGH · command injection</text>
    <text x="126" y="396" font-size="21" font-weight="700" fill="#F8FBFF">Unsanitized shell execution</text>
    <text x="600" y="396" font-size="13" fill="#D7E5F4">app.py:8 · CWE-78</text>

    <text x="126" y="462" font-size="13" fill="#FCA5A5">HIGH · sql injection</text>
    <text x="126" y="486" font-size="21" font-weight="700" fill="#F8FBFF">SQL query built from string interpolation</text>
    <text x="600" y="486" font-size="13" fill="#D7E5F4">app.py:13 · CWE-89</text>

    <text x="126" y="552" font-size="13" fill="#FCD34D">MEDIUM · cross-site scripting</text>
    <text x="126" y="576" font-size="21" font-weight="700" fill="#F8FBFF">Unsafe HTML rendering in profile view</text>
    <text x="600" y="576" font-size="13" fill="#D7E5F4">profile.html:2 · CWE-79</text>

    <text x="126" y="642" font-size="13" fill="#FCD34D">MEDIUM · secrets</text>
    <text x="126" y="666" font-size="21" font-weight="700" fill="#F8FBFF">Hardcoded application secret</text>
    <text x="600" y="666" font-size="13" fill="#D7E5F4">app.py:4 · CWE-798</text>
  </g>

  <g font-family="'Segoe UI', Arial, sans-serif">
    <rect x="876" y="342" width="222" height="342" rx="22" fill="#0A1322" stroke="#20344D" />
    <text x="900" y="374" font-size="14" fill="#8DB0D0">REVIEW METADATA</text>

    <text x="900" y="418" font-size="13" fill="#89ACCC">scan_type</text>
    <text x="900" y="442" font-size="20" font-weight="700" fill="#F8FBFF">directory</text>

    <text x="900" y="484" font-size="13" fill="#89ACCC">scan_model</text>
    <text x="900" y="508" font-size="20" font-weight="700" fill="#F8FBFF">demo-model</text>

    <text x="900" y="550" font-size="13" fill="#89ACCC">languages</text>
    <text x="900" y="574" font-size="18" fill="#F8FBFF">python, html</text>

    <rect x="900" y="604" width="174" height="34" rx="17" fill="#102239" stroke="#28425D" />
    <text x="921" y="626" font-family="'Cascadia Code', Consolas, monospace" font-size="12" fill="#CFE0F2">output: structured json</text>

    <rect x="900" y="648" width="126" height="16" rx="8" fill="#1E293B" />
    <rect x="900" y="648" width="92" height="16" rx="8" fill="#2DD4BF" />
    <text x="1036" y="661" font-size="11" fill="#89ACCC">confidence</text>
  </g>
</svg>
