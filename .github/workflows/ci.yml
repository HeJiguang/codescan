name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests -q

      - name: Compile package
        run: python -m compileall codescan

      - name: Smoke test CLI
        run: python -m codescan --help

      - name: Smoke test MCP CLI
        run: python -m codescan mcp --help
